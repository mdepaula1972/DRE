<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Contratos - Impostos | Mar Brasil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-dark text-white">
    <div class="container py-5">
        <div class="row mb-4">
            <div class="col">
                <h1 class="h3">
                    <i class="bi bi-pencil-square"></i>
                    Configurar Impostos dos Contratos
                </h1>
                <p class="text-muted">Atualize as configurações de ISS, ICMS e faturamento para cada contrato</p>
            </div>
        </div>

        <div class="alert alert-info">
            <strong>ℹ️ Info:</strong> Estas configurações são usadas para calcular automaticamente os impostos nas notas
            fiscais.
        </div>

        <div id="loadingIndicator" class="text-center py-5" style="display: none;">
            <div class="spinner-border text-warning" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>

        <div id="contractsList" class="row g-3">
            <!-- Cards de contratos serão inseridos aqui -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Inicializar Supabase
        const SUPABASE_URL = "https://ngtjhwswbbivqajtpjvg.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ndGpod3N3YmJpdnFhanRwanZnIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2OTE4MjM2MCwiZXhwIjoyMDg0NzU4MzYwfQ.2TPnOfnAzeWG23Y-VuDKxxzQ9QdbHwrnHdVBhS9hU28";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadContracts() {
            const loading = document.getElementById('loadingIndicator');
            const container = document.getElementById('contractsList');

            loading.style.display = 'block';

            try {
                const { data, error } = await supabaseClient
                    .from('contratos_base')
                    .select('*')
                    .eq('ativo', true)
                    .order('nome_contrato');

                if (error) throw error;

                container.innerHTML = '';

                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="col-12"><div class="alert alert-warning">Nenhum contrato encontrado.</div></div>';
                    return;
                }

                data.forEach(contract => {
                    const card = createContractCard(contract);
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Erro ao carregar contratos:', error);
                container.innerHTML = '<div class="col-12"><div class="alert alert-danger">Erro ao carregar contratos: ' + error.message + '</div></div>';
            } finally {
                loading.style.display = 'none';
            }
        }

        function createContractCard(contract) {
            const col = document.createElement('div');
            col.className = 'col-md-6 col-lg-4';

            const cardHTML = `
                <div class="card bg-secondary text-white h-100">
                    <div class="card-body">
                        <h5 class="card-title text-warning">${contract.nome_contrato}</h5>
                        <p class="small text-muted">ID: ${contract.id}</p>
                        
                        <form data-contract-id="${contract.id}">
                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input iss-check" type="checkbox" 
                                           ${contract.tem_iss ? 'checked' : ''}>
                                    <label class="form-check-label">
                                        Tem ISS?
                                    </label>
                                </div>
                                <input type="number" class="form-control form-control-sm mt-2 bg-dark text-white iss-input" 
                                       placeholder="Ex: 2.5"
                                       step="0.01"
                                       value="${contract.aliquota_iss || 0}"
                                       ${!contract.tem_iss ? 'disabled' : ''}>
                                <small class="text-muted">Alíquota ISS (%)</small>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input icms-check" type="checkbox"
                                           ${contract.tem_icms ? 'checked' : ''}>
                                    <label class="form-check-label">
                                        Tem ICMS?
                                    </label>
                                </div>
                                <input type="number" class="form-control form-control-sm mt-2 bg-dark text-white icms-input" 
                                       placeholder="Ex: 12"
                                       step="0.01"
                                       value="${contract.aliquota_icms || 0}"
                                       ${!contract.tem_icms ? 'disabled' : ''}>
                                <small class="text-muted">Alíquota ICMS (%)</small>
                            </div>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input equip-check" type="checkbox"
                                           ${contract.contrato_por_equipamentos ? 'checked' : ''}>
                                    <label class="form-check-label">
                                        Faturamento por equipamentos?
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-warning btn-sm w-100">
                                <i class="bi bi-save"></i> Salvar
                            </button>
                        </form>
                    </div>
                </div>
            `;

            col.innerHTML = cardHTML;

            // Event listeners
            const issCheck = col.querySelector('.iss-check');
            const issInput = col.querySelector('.iss-input');
            issCheck.addEventListener('change', () => {
                issInput.disabled = !issCheck.checked;
            });

            const icmsCheck = col.querySelector('.icms-check');
            const icmsInput = col.querySelector('.icms-input');
            icmsCheck.addEventListener('change', () => {
                icmsInput.disabled = !icmsCheck.checked;
            });

            const form = col.querySelector('form');
            form.addEventListener('submit', (e) => saveContract(e));

            return col;
        }

        async function saveContract(e) {
            e.preventDefault();

            const form = e.target;
            const contractId = form.getAttribute('data-contract-id');

            const issCheck = form.querySelector('.iss-check');
            const issInput = form.querySelector('.iss-input');
            const icmsCheck = form.querySelector('.icms-check');
            const icmsInput = form.querySelector('.icms-input');
            const equipCheck = form.querySelector('.equip-check');

            const updates = {
                tem_iss: issCheck.checked,
                aliquota_iss: parseFloat(issInput.value) || 0,
                tem_icms: icmsCheck.checked,
                aliquota_icms: parseFloat(icmsInput.value) || 0,
                contrato_por_equipamentos: equipCheck.checked
            };

            try {
                const { error } = await supabaseClient
                    .from('contratos_base')
                    .update(updates)
                    .eq('id', contractId);

                if (error) throw error;

                // Feedback visual
                const btn = form.querySelector('button[type="submit"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="bi bi-check"></i> Salvo!';
                btn.classList.remove('btn-warning');
                btn.classList.add('btn-success');

                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-warning');
                }, 2000);

            } catch (error) {
                console.error('Erro ao salvar:', error);
                alert('Erro ao salvar: ' + error.message);
            }
        }

        // Carregar ao iniciar
        document.addEventListener('DOMContentLoaded', loadContracts);
    </script>
</body>

</html>
