<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dashboard Financeiro Mar Brasil</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="Favicon.png">
    <script src="version.js?v=17.0"></script>

    <style>
        :root {
            --primary: #F2911B;
            --secondary: #00477A;
            --dark-bg: #0d0d0d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--dark-bg);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(242, 145, 27, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 71, 122, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-container img {
            max-height: 80px;
            filter: drop-shadow(0 0 15px rgba(242, 145, 27, 0.3));
        }

        .login-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            background: linear-gradient(45deg, #fff, var(--primary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
        }

        .form-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(242, 145, 27, 0.15);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-left: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-group-text:hover {
            color: var(--primary);
            background: rgba(242, 145, 27, 0.1);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #e07a00);
            border: none;
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(242, 145, 27, 0.3);
            background: linear-gradient(135deg, #e07a00, var(--primary));
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .forgot-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-link:hover {
            color: var(--primary);
        }

        .alert {
            border-radius: 10px;
            font-size: 0.85rem;
            padding: 12px 15px;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #ff6b7a;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.15);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #5dd879;
        }

        .version-tag {
            text-align: center;
            margin-top: 25px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
        }

        /* Reset Password Modal */
        .modal-content {
            background: rgba(26, 26, 26, 0.98);
            border: 1px solid var(--card-border);
            border-radius: 15px;
        }

        .modal-header {
            border-bottom: 1px solid var(--card-border);
        }

        .modal-title {
            color: white;
        }

        .btn-close {
            filter: invert(1);
        }

        .modal-body {
            color: rgba(255, 255, 255, 0.8);
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-login.loading .loading-spinner {
            display: inline-block;
        }

        .btn-login.loading .btn-text {
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <img src="Mar-Brasil-sem-fundo-preto.png" alt="Mar Brasil Logo">
            </div>

            <h1 class="login-title">Dashboard Financeiro</h1>
            <p class="login-subtitle">Digite suas credenciais para acessar</p>

            <!-- Alert Messages -->
            <div id="alertContainer"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="seu@email.com" required autocomplete="email">
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Senha</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
                        <span class="input-group-text" id="togglePassword" title="Mostrar/Ocultar senha">
                            <i class="bi bi-eye"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-login" id="btnLogin">
                    <span class="loading-spinner"></span>
                    <span class="btn-text">Entrar</span>
                </button>
            </form>

            <a href="#" class="forgot-link" data-bs-toggle="modal" data-bs-target="#forgotModal">
                <i class="bi bi-key me-1"></i> Esqueci minha senha
            </a>

            <div class="version-tag">
                Versão <span id="versionDisplay">17.0</span>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-envelope me-2"></i>Recuperar Senha</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3">Digite seu e-mail cadastrado. Enviaremos um link para redefinir sua senha.</p>
                    <div id="forgotAlertContainer"></div>
                    <form id="forgotForm">
                        <div class="mb-3">
                            <label for="forgotEmail" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="forgotEmail" placeholder="seu@email.com" required>
                        </div>
                        <button type="submit" class="btn btn-login" id="btnForgot">
                            <span class="loading-spinner"></span>
                            <span class="btn-text">Enviar Link</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="login.js?v=17.0"></script>
</body>

</html>
